<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Georgia', 'Times New Roman', serif; background: #fff; -webkit-print-color-adjust: exact; }
      .certificate {
        width: 297mm; height: 210mm;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 12mm 18mm;
        background: linear-gradient(135deg, #fefefe 0%, #f8f6f0 100%);
        border: 8px double {{primaryColor}};
        position: relative;
      }
      .corner { position: absolute; width: 30mm; height: 30mm; border: 2px solid {{primaryColor}}; opacity: 0.5; }
      .corner.tl { top: 8mm; left: 8mm; border-right: none; border-bottom: none; }
      .corner.tr { top: 8mm; right: 8mm; border-left: none; border-bottom: none; }
      .corner.bl { bottom: 8mm; left: 8mm; border-right: none; border-top: none; }
      .corner.br { bottom: 8mm; right: 8mm; border-left: none; border-top: none; }
      .header { text-align: center; margin-bottom: 6mm; }
      .logo-img { max-height: 55px; max-width: 160px; object-fit: contain; margin-bottom: 4mm; }
      .cert-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: {{primaryColor}}; }
      .cert-title { font-size: 30px; font-weight: 700; color: #1a1a1a; margin: 3mm 0; }
      .ornament { font-size: 20px; color: {{primaryColor}}; margin: 2mm 0; }
      .presented-to { font-size: 13px; color: #666; font-style: italic; }
      .recipient-name { font-size: 34px; color: {{primaryColor}}; font-style: italic; margin: 3mm 0; }
      .description { font-size: 13px; color: #555; text-align: center; max-width: 170mm; line-height: 1.7; margin: 3mm 0; }
      .footer { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: auto; }
      .footer-section { text-align: center; }
      .sign-line { width: 50mm; height: 1px; background: #666; margin-bottom: 2mm; }
      .signature-img { max-height: 40px; object-fit: contain; }
      .footer-label { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
      .footer-value { font-size: 12px; color: #333; font-weight: 600; }
      .cert-id { font-size: 8px; color: #bbb; font-family: monospace; }
    </style>
  </head>
  <body>
    <div class="certificate">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="header">
        {{organizationLogo}}
        <div class="cert-label">Certificate of Completion</div>
        <div class="cert-title">{{certificateTitle}}</div>
        <div class="ornament">&#8853;</div>
      </div>
      <div class="presented-to">This is to certify that</div>
      <div class="recipient-name">{{recipientName}}</div>
      <div class="description">{{description}}</div>
      <div class="footer">
        <div class="footer-section">
          <div class="footer-value">{{issueDate}}</div>
          <div class="sign-line"></div>
          <div class="footer-label">Date</div>
        </div>
        <div class="footer-section">
          <div class="cert-id">ID: {{certificateId}}</div>
        </div>
        <div class="footer-section">
          {{issuerSignature}}
          <div class="sign-line"></div>
          <div class="footer-value">{{issuerName}}</div>
          <div class="footer-label">Signature</div>
        </div>
      </div>
    </div>
  </body>
</html>
