<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Georgia', 'Times New Roman', serif; background: #fff; -webkit-print-color-adjust: exact; }
      .certificate {
        width: 297mm; height: 210mm;
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 14mm 20mm;
        background: linear-gradient(to bottom right, #fefefe 0%, #f8f8f8 100%);
      }
      .border-frame {
        position: absolute; inset: 5mm;
        border: 2px solid {{primaryColor}};
        pointer-events: none;
      }
      .corner-accent {
        position: absolute;
        width: 12mm; height: 12mm;
        background: {{primaryColor}};
        opacity: 0.1;
      }
      .corner-tl { top: 5mm; left: 5mm; }
      .corner-tr { top: 5mm; right: 5mm; }
      .corner-bl { bottom: 5mm; left: 5mm; }
      .corner-br { bottom: 5mm; right: 5mm; }
      .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 5mm; }
      .logo-img { max-height: 45px; max-width: 150px; object-fit: contain; margin-bottom: 3mm; }
      .cert-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: {{secondaryColor}}; font-weight: 600; }
      .cert-title { font-size: 34px; font-weight: 700; color: {{primaryColor}}; margin: 4mm 0 2mm; text-align: center; }
      .divider { width: 60mm; height: 1px; background: {{primaryColor}}; margin: 4mm auto; opacity: 0.6; }
      .presented-to { font-size: 11px; color: #666; margin-bottom: 2mm; }
      .recipient-name { font-size: 30px; color: #1a1a1a; margin-bottom: 3mm; font-weight: 700; }
      .attended { font-size: 10px; color: #888; margin-bottom: 2mm; text-transform: uppercase; letter-spacing: 1px; }
      .conference-name { font-size: 18px; color: {{primaryColor}}; margin-bottom: 3mm; font-weight: 600; text-align: center; font-style: italic; }
      .description { font-size: 11px; color: #444; text-align: center; max-width: 160mm; line-height: 1.6; margin-bottom: 4mm; }
      .footer { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: auto; }
      .footer-item { display: flex; flex-direction: column; align-items: center; }
      .footer-label { font-size: 8px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-top: 2mm; }
      .footer-value { font-size: 11px; color: #333; font-weight: 600; }
      .signature-img { max-height: 35px; max-width: 100px; object-fit: contain; }
      .sign-line { width: 40mm; height: 1px; background: #ccc; margin-bottom: 2mm; }
      .qr-section { display: flex; flex-direction: column; align-items: center; gap: 1mm; }
      .qr-code { width: 18mm; height: 18mm; }
      .qr-label { font-size: 6px; color: #888; text-transform: uppercase; }
      .cert-id { font-size: 7px; color: #aaa; font-family: monospace; }
    </style>
  </head>
  <body>
    <div class="certificate">
      <div class="border-frame"></div>
      <div class="corner-accent corner-tl"></div>
      <div class="corner-accent corner-tr"></div>
      <div class="corner-accent corner-bl"></div>
      <div class="corner-accent corner-br"></div>
      <div class="header">
        {{organizationLogo}}
        <div class="cert-label">Conference Attendance</div>
      </div>
      <div class="cert-title">{{certificateTitle}}</div>
      <div class="divider"></div>
      <div class="presented-to">This certifies that</div>
      <div class="recipient-name">{{recipientName}}</div>
      <div class="attended">Attended</div>
      <div class="conference-name">{{description}}</div>
      <div class="footer">
        <div class="footer-item">
          <div class="qr-section">
            {{verifyQR}}
            <span class="qr-label">Verify</span>
          </div>
        </div>
        <div class="footer-item">
          <div class="footer-value">{{issueDate}}</div>
          <div class="footer-label">Date</div>
        </div>
        <div class="footer-item">
          <div class="sign-line"></div>
          {{issuerSignature}}
          <div class="footer-value">{{issuerName}}</div>
          <div class="footer-label">Organizer</div>
        </div>
        <div class="footer-item">
          <div class="cert-id">ID: {{certificateId}}</div>
        </div>
      </div>
    </div>
  </body>
</html>
