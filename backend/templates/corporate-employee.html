<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Arial', 'Helvetica', sans-serif; background: #fff; -webkit-print-color-adjust: exact; }
      .certificate {
        width: 297mm; height: 210mm;
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 15mm 20mm;
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
      }
      .border-frame {
        position: absolute; inset: 5mm;
        border: 3px solid {{primaryColor}};
        pointer-events: none;
      }
      .accent-corner {
        position: absolute;
        width: 15mm; height: 15mm;
        border: 2px solid {{primaryColor}};
        opacity: 0.4;
      }
      .accent-tl { top: 8mm; left: 8mm; border-right: none; border-bottom: none; }
      .accent-tr { top: 8mm; right: 8mm; border-left: none; border-bottom: none; }
      .accent-bl { bottom: 8mm; left: 8mm; border-right: none; border-top: none; }
      .accent-br { bottom: 8mm; right: 8mm; border-left: none; border-top: none; }
      .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 6mm; }
      .logo-img { max-height: 50px; max-width: 160px; object-fit: contain; margin-bottom: 3mm; }
      .cert-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: {{secondaryColor}}; font-weight: 600; }
      .cert-title { font-size: 36px; font-weight: 700; color: {{primaryColor}}; margin: 4mm 0 2mm; text-align: center; }
      .month-badge {
        display: inline-block;
        padding: 2mm 8mm;
        background: {{primaryColor}};
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 4mm;
      }
      .divider { width: 50mm; height: 2px; background: {{primaryColor}}; margin: 4mm auto; opacity: 0.6; }
      .presented-to { font-size: 11px; color: #666; margin-bottom: 2mm; }
      .recipient-name { font-size: 32px; color: #1a1a1a; margin-bottom: 3mm; font-weight: 700; }
      .description { font-size: 12px; color: #444; text-align: center; max-width: 170mm; line-height: 1.6; margin-bottom: 5mm; }
      .footer { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: auto; }
      .footer-item { display: flex; flex-direction: column; align-items: center; }
      .footer-label { font-size: 8px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-top: 2mm; }
      .footer-value { font-size: 11px; color: #333; font-weight: 600; }
      .signature-img { max-height: 35px; max-width: 100px; object-fit: contain; }
      .sign-line { width: 40mm; height: 1px; background: #ccc; margin-bottom: 2mm; }
      .qr-section { display: flex; flex-direction: column; align-items: center; gap: 1mm; }
      .qr-code { width: 18mm; height: 18mm; }
      .qr-label { font-size: 6px; color: #888; text-transform: uppercase; }
      .cert-id { font-size: 7px; color: #bbb; font-family: monospace; }
    </style>
  </head>
  <body>
    <div class="certificate">
      <div class="border-frame"></div>
      <div class="accent-corner accent-tl"></div>
      <div class="accent-corner accent-tr"></div>
      <div class="accent-corner accent-bl"></div>
      <div class="accent-corner accent-br"></div>
      <div class="header">
        {{organizationLogo}}
        <div class="cert-label">Employee Recognition</div>
      </div>
      <div class="cert-title">{{certificateTitle}}</div>
      <div class="month-badge">{{issueDate}}</div>
      <div class="divider"></div>
      <div class="presented-to">Congratulations to</div>
      <div class="recipient-name">{{recipientName}}</div>
      <div class="description">{{description}}</div>
      <div class="footer">
        <div class="footer-item">
          <div class="qr-section">
            {{verifyQR}}
            <span class="qr-label">Verify</span>
          </div>
        </div>
        <div class="footer-item">
          <div class="sign-line"></div>
          {{issuerSignature}}
          <div class="footer-value">{{issuerName}}</div>
          <div class="footer-label">Manager</div>
        </div>
        <div class="footer-item">
          <div class="cert-id">ID: {{certificateId}}</div>
        </div>
      </div>
    </div>
  </body>
</html>
