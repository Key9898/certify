<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Arial', sans-serif; background: #fff; -webkit-print-color-adjust: exact; }
      .certificate {
        width: 297mm; height: 210mm;
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 15mm 20mm;
        border: 3px solid {{primaryColor}};
      }
      .border-inner {
        position: absolute; inset: 6mm;
        border: 1px solid {{primaryColor}};
        opacity: 0.3;
        pointer-events: none;
      }
      .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 8mm; width: 100%; }
      .logo-img { max-height: 60px; max-width: 180px; object-fit: contain; margin-bottom: 4mm; }
      .cert-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: {{primaryColor}}; font-weight: 700; }
      .cert-title { font-size: 36px; font-weight: 700; color: #1a1a1a; margin: 3mm 0 2mm; text-align: center; }
      .cert-subtitle { font-size: 13px; color: #666; letter-spacing: 1px; }
      .divider { width: 80mm; height: 2px; background: linear-gradient(to right, transparent, {{primaryColor}}, transparent); margin: 5mm auto; }
      .presented-to { font-size: 13px; color: #666; margin-bottom: 2mm; }
      .recipient-name { font-size: 32px; color: {{primaryColor}}; font-style: italic; margin-bottom: 3mm; font-family: 'Georgia', serif; font-weight: 700; }
      .description { font-size: 13px; color: #444; text-align: center; max-width: 180mm; line-height: 1.6; margin-bottom: 5mm; }
      .footer { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: auto; }
      .footer-item { display: flex; flex-direction: column; align-items: center; }
      .footer-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-top: 2mm; }
      .footer-value { font-size: 13px; color: #333; font-weight: 600; }
      .signature-img { max-height: 45px; max-width: 130px; object-fit: contain; }
      .sign-line { width: 50mm; height: 1px; background: #ccc; margin-bottom: 2mm; }
      .cert-id { font-size: 9px; color: #bbb; font-family: monospace; }
    </style>
  </head>
  <body>
    <div class="certificate">
      <div class="border-inner"></div>
      <div class="header">
        {{organizationLogo}}
        <div class="cert-label">Certificate of Achievement</div>
      </div>
      <div class="cert-title">{{certificateTitle}}</div>
      <div class="divider"></div>
      <div class="presented-to">This certificate is proudly presented to</div>
      <div class="recipient-name">{{recipientName}}</div>
      <div class="description">{{description}}</div>
      <div class="footer">
        <div class="footer-item">
          <div class="footer-value">{{issueDate}}</div>
          <div class="footer-label">Date of Issue</div>
        </div>
        <div class="footer-item">
          <div class="cert-id">ID: {{certificateId}}</div>
        </div>
        <div class="footer-item">
          <div class="sign-line"></div>
          {{issuerSignature}}
          <div class="footer-value">{{issuerName}}</div>
          <div class="footer-label">Authorized Signatory</div>
        </div>
      </div>
    </div>
  </body>
</html>
