<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Arial', 'Helvetica', sans-serif; background: #fff; -webkit-print-color-adjust: exact; }
      .certificate {
        width: 297mm; height: 210mm;
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 15mm 20mm;
        background: #fff;
      }
      .border-frame {
        position: absolute; inset: 5mm;
        border: 2px solid {{primaryColor}};
        pointer-events: none;
      }
      .accent-line {
        position: absolute; inset: 8mm;
        border: 1px solid {{primaryColor}};
        opacity: 0.3;
        pointer-events: none;
      }
      .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 8mm; }
      .logo-img { max-height: 55px; max-width: 170px; object-fit: contain; margin-bottom: 4mm; }
      .cert-label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: {{secondaryColor}}; font-weight: 600; }
      .cert-title { font-size: 38px; font-weight: 700; color: {{primaryColor}}; margin: 4mm 0 3mm; text-align: center; }
      .subtitle { font-size: 12px; color: #666; letter-spacing: 1px; }
      .divider { width: 60mm; height: 2px; background: {{primaryColor}}; margin: 5mm auto; }
      .presented-to { font-size: 12px; color: #666; margin-bottom: 2mm; }
      .recipient-name { font-size: 34px; color: #1a1a1a; margin-bottom: 4mm; font-weight: 700; }
      .description { font-size: 13px; color: #444; text-align: center; max-width: 180mm; line-height: 1.6; margin-bottom: 6mm; }
      .footer { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: auto; }
      .footer-item { display: flex; flex-direction: column; align-items: center; }
      .footer-label { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-top: 2mm; }
      .footer-value { font-size: 12px; color: #333; font-weight: 600; }
      .signature-img { max-height: 40px; max-width: 110px; object-fit: contain; }
      .sign-line { width: 45mm; height: 1px; background: #ccc; margin-bottom: 2mm; }
      .qr-section { display: flex; flex-direction: column; align-items: center; gap: 1mm; }
      .qr-code { width: 20mm; height: 20mm; }
      .qr-label { font-size: 6px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
      .cert-id { font-size: 8px; color: #bbb; font-family: monospace; }
    </style>
  </head>
  <body>
    <div class="certificate">
      <div class="border-frame"></div>
      <div class="accent-line"></div>
      <div class="header">
        {{organizationLogo}}
        <div class="cert-label">Certificate of Achievement</div>
      </div>
      <div class="cert-title">{{certificateTitle}}</div>
      <div class="subtitle">Academic Excellence Award</div>
      <div class="divider"></div>
      <div class="presented-to">Proudly presented to</div>
      <div class="recipient-name">{{recipientName}}</div>
      <div class="description">{{description}}</div>
      <div class="footer">
        <div class="footer-item">
          <div class="qr-section">
            {{verifyQR}}
            <span class="qr-label">Verify</span>
          </div>
        </div>
        <div class="footer-item">
          <div class="footer-value">{{issueDate}}</div>
          <div class="footer-label">Date</div>
        </div>
        <div class="footer-item">
          <div class="sign-line"></div>
          {{issuerSignature}}
          <div class="footer-value">{{issuerName}}</div>
          <div class="footer-label">Signature</div>
        </div>
        <div class="footer-item">
          <div class="cert-id">ID: {{certificateId}}</div>
        </div>
      </div>
    </div>
  </body>
</html>
