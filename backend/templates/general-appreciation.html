<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Georgia', 'Times New Roman', serif; background: #fff; -webkit-print-color-adjust: exact; }
      .certificate {
        width: 297mm; height: 210mm;
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 14mm 20mm;
        background: linear-gradient(135deg, #fefefe 0%, #faf8f5 50%, #fefefe 100%);
      }
      .border-outer {
        position: absolute; inset: 4mm;
        border: 2px solid {{primaryColor}};
        pointer-events: none;
      }
      .border-inner {
        position: absolute; inset: 7mm;
        border: 1px solid {{primaryColor}};
        opacity: 0.3;
        pointer-events: none;
      }
      .heart-decor {
        position: absolute;
        font-size: 16px;
        color: {{primaryColor}};
        opacity: 0.15;
      }
      .heart-1 { top: 12mm; left: 15mm; }
      .heart-2 { top: 12mm; right: 15mm; }
      .heart-3 { bottom: 12mm; left: 15mm; }
      .heart-4 { bottom: 12mm; right: 15mm; }
      .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 5mm; }
      .logo-img { max-height: 45px; max-width: 150px; object-fit: contain; margin-bottom: 3mm; }
      .cert-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: {{secondaryColor}}; font-weight: 600; }
      .cert-title { font-size: 38px; font-weight: 700; color: {{primaryColor}}; margin: 4mm 0 3mm; text-align: center; font-style: italic; }
      .divider { width: 70mm; height: 1px; background: {{primaryColor}}; margin: 4mm auto; opacity: 0.5; }
      .presented-to { font-size: 11px; color: #666; margin-bottom: 2mm; }
      .recipient-name { font-size: 32px; color: #1a1a1a; margin-bottom: 4mm; font-weight: 700; }
      .description { font-size: 12px; color: #444; text-align: center; max-width: 170mm; line-height: 1.7; margin-bottom: 5mm; }
      .footer { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: auto; padding: 0 5mm; }
      .footer-item { display: flex; flex-direction: column; align-items: center; }
      .footer-label { font-size: 8px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-top: 2mm; }
      .footer-value { font-size: 11px; color: #333; font-weight: 600; }
      .signature-img { max-height: 35px; max-width: 100px; object-fit: contain; }
      .sign-line { width: 40mm; height: 1px; background: #ccc; margin-bottom: 2mm; }
      .qr-section { display: flex; flex-direction: column; align-items: center; gap: 1mm; }
      .qr-code { width: 18mm; height: 18mm; }
      .qr-label { font-size: 6px; color: #888; text-transform: uppercase; }
      .cert-id { font-size: 7px; color: #aaa; font-family: monospace; }
    </style>
  </head>
  <body>
    <div class="certificate">
      <div class="border-outer"></div>
      <div class="border-inner"></div>
      <div class="heart-decor heart-1">♥</div>
      <div class="heart-decor heart-2">♥</div>
      <div class="heart-decor heart-3">♥</div>
      <div class="heart-decor heart-4">♥</div>
      <div class="header">
        {{organizationLogo}}
        <div class="cert-label">With Gratitude</div>
      </div>
      <div class="cert-title">{{certificateTitle}}</div>
      <div class="divider"></div>
      <div class="presented-to">
        With sincere appreciation, this certificate is presented to
      </div>
      <div class="recipient-name">{{recipientName}}</div>
      <div class="description">{{description}}</div>
      <div class="footer">
        <div class="footer-item">
          <div class="qr-section">
            {{verifyQR}}
            <span class="qr-label">Verify</span>
          </div>
        </div>
        <div class="footer-item">
          <div class="footer-value">{{issueDate}}</div>
          <div class="footer-label">Date</div>
        </div>
        <div class="footer-item">
          <div class="sign-line"></div>
          {{issuerSignature}}
          <div class="footer-value">{{issuerName}}</div>
          <div class="footer-label">Signature</div>
        </div>
        <div class="footer-item">
          <div class="cert-id">ID: {{certificateId}}</div>
        </div>
      </div>
    </div>
  </body>
</html>
