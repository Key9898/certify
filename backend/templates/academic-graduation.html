<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Georgia', 'Times New Roman', serif; background: #fff; -webkit-print-color-adjust: exact; }
      .certificate {
        width: 297mm; height: 210mm;
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 14mm 22mm;
        background: linear-gradient(to bottom, #fefefe 0%, #faf9f6 100%);
      }
      .border-ornate {
        position: absolute; inset: 4mm;
        border: 4px solid {{primaryColor}};
        pointer-events: none;
      }
      .border-inner {
        position: absolute; inset: 9mm;
        border: 1px solid {{primaryColor}};
        opacity: 0.4;
        pointer-events: none;
      }
      .seal {
        position: absolute;
        top: 14mm; right: 14mm;
        width: 25mm; height: 25mm;
        border: 2px solid {{primaryColor}};
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 8px; color: {{primaryColor}};
        text-transform: uppercase; letter-spacing: 1px;
        opacity: 0.6;
      }
      .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 5mm; }
      .logo-img { max-height: 50px; max-width: 150px; object-fit: contain; margin-bottom: 3mm; }
      .institution { font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: {{primaryColor}}; font-weight: 700; }
      .cert-type { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: {{secondaryColor}}; margin-top: 2mm; }
      .cert-title { font-size: 44px; font-weight: 700; color: #1a1a1a; margin: 5mm 0 3mm; text-align: center; }
      .divider { width: 80mm; height: 1px; background: {{primaryColor}}; margin: 4mm auto; opacity: 0.6; }
      .presented-to { font-size: 11px; color: #666; margin-bottom: 2mm; font-style: italic; }
      .recipient-name { font-size: 32px; color: {{primaryColor}}; margin-bottom: 4mm; font-weight: 700; font-style: italic; }
      .description { font-size: 12px; color: #444; text-align: center; max-width: 165mm; line-height: 1.7; margin-bottom: 5mm; }
      .footer { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: auto; padding: 0 5mm; }
      .footer-item { display: flex; flex-direction: column; align-items: center; }
      .footer-label { font-size: 8px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-top: 2mm; }
      .footer-value { font-size: 11px; color: #333; font-weight: 600; }
      .signature-img { max-height: 35px; max-width: 100px; object-fit: contain; }
      .sign-line { width: 40mm; height: 1px; background: #ccc; margin-bottom: 2mm; }
      .qr-section { display: flex; flex-direction: column; align-items: center; gap: 1mm; }
      .qr-code { width: 20mm; height: 20mm; }
      .qr-label { font-size: 6px; color: #888; text-transform: uppercase; }
      .cert-id { font-size: 7px; color: #aaa; font-family: monospace; }
    </style>
  </head>
  <body>
    <div class="certificate">
      <div class="border-ornate"></div>
      <div class="border-inner"></div>
      <div class="seal">Official</div>
      <div class="header">
        {{organizationLogo}}
        <div class="institution">{{issuerName}}</div>
        <div class="cert-type">Graduation Certificate</div>
      </div>
      <div class="cert-title">{{certificateTitle}}</div>
      <div class="divider"></div>
      <div class="presented-to">This is to certify that</div>
      <div class="recipient-name">{{recipientName}}</div>
      <div class="description">{{description}}</div>
      <div class="footer">
        <div class="footer-item">
          <div class="qr-section">
            {{verifyQR}}
            <span class="qr-label">Verify</span>
          </div>
        </div>
        <div class="footer-item">
          <div class="footer-value">{{issueDate}}</div>
          <div class="footer-label">Date of Graduation</div>
        </div>
        <div class="footer-item">
          <div class="sign-line"></div>
          {{issuerSignature}}
          <div class="footer-value">{{issuerName}}</div>
          <div class="footer-label">Registrar</div>
        </div>
        <div class="footer-item">
          <div class="cert-id">ID: {{certificateId}}</div>
        </div>
      </div>
    </div>
  </body>
</html>
